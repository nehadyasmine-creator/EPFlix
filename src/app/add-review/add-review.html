<div class="container mt-5">
  <div class="add-review-container">
    <h1>Ajouter un Commentaire</h1>

    <div class="add-review-content">
      <!-- Sélection du film -->
      <div class="section">
        <h2>Choisir un film</h2>

        <div *ngIf="loadingMovies" class="loading">
          <p>Chargement des films...</p>
        </div>

        <div *ngIf="!loadingMovies" class="movies-scroll">
          <div *ngFor="let movie of movies" 
            (click)="selectMovie(movie)"
            [class.selected]="selectedMovie?.id === movie.id"
            class="movie-item">
            <img [src]="'http://localhost:8080/movies/' + movie.id + '/image'" [alt]="movie.title">
            <div class="movie-info">
              <h4>{{ movie.title }}</h4>
              <p>{{ movie.director }}</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Formulaire de commentaire -->
      <div *ngIf="selectedMovie" class="section review-form">
        <h2>Votre Commentaire</h2>

        <!-- Film sélectionné -->
        <div class="selected-movie">
          <img [src]="'http://localhost:8080/movies/' + selectedMovie.id + '/image'" [alt]="selectedMovie.title">
          <div class="selected-info">
            <h3>{{ selectedMovie.title }}</h3>
            <p>{{ selectedMovie.director }}</p>
            <p class="synopsis">{{ selectedMovie.synopsis }}</p>
          </div>
        </div>

        <!-- Notation -->
        <div class="form-group">
          <label>Votre note :</label>
          <div class="rating-selector">
            <button
              type="button"
              *ngFor="let i of [1,2,3,4,5]"
              (click)="setRating(i)"
              [class.active]="rating === i"
              class="star-btn">
              ⭐
            </button>
          </div>
          <span *ngIf="rating > 0" class="rating-display">{{ rating }}/5</span>
        </div>

        <!-- Texte du commentaire -->
        <div class="form-group">
          <label>Votre commentaire :</label>
          <textarea 
            [(ngModel)]="reviewText"
            placeholder="Écrivez votre commentaire ici... (minimum 10 caractères)"
            class="form-control"></textarea>
          <span class="char-count">{{ reviewText.length }}/500</span>
        </div>

        <!-- Boutons -->
        <div class="form-actions">
          <button class="btn-submit" 
            (click)="submitting || submitReview()" 
            [disabled]="submitting"
            type="button">
            {{ submitting ? 'Publication...' : 'Publier le commentaire' }}
          </button>
          <button type="button" class="btn-cancel" routerLink="/myreviews">Annuler</button>
        </div>
      </div>

      <!-- Message si aucun film sélectionné -->
      <div *ngIf="!loadingMovies && !selectedMovie" class="empty-selection">
        <i class="bi bi-film"></i>
        <p>Sélectionnez un film pour commencer</p>
      </div>
    </div>
  </div>
</div>
