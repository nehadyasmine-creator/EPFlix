<div class="update-movie-container">
  <div class="update-movie-header">
    <h1>Modifier un film</h1>
    <p class="subtitle">Mettez à jour les informations du film</p>
  </div>

  <div class="form-wrapper">
    <form class="movie-form">
      <div class="form-group">
        <label for="title">Titre du film *</label>
        <input 
          type="text" 
          id="title" 
          name="title" 
          [(ngModel)]="movie.title"
          class="form-control"
          placeholder="Entrez le titre du film"
          required
        />
      </div>

      <div class="form-group">
        <label for="director">Réalisateur *</label>
        <input 
          type="text" 
          id="director" 
          name="director" 
          [(ngModel)]="movie.director"
          class="form-control"
          placeholder="Nom du réalisateur"
          required
        />
      </div>

      <div class="form-group">
        <label for="releaseDate">Date de sortie *</label>
        <input 
          type="date" 
          id="releaseDate" 
          name="releaseDate" 
          [value]="movie.releaseDate | date:'yyyy-MM-dd'"
          (change)="movie.releaseDate = $any($event.target).value"
          class="form-control"
          required
        />
      </div>

      <div class="form-group">
        <label for="rate">Note (0-5) *</label>
        <input 
          type="number" 
          id="rate" 
          name="rate" 
          [(ngModel)]="movie.rate"
          class="form-control"
          min="0"
          max="5"
          step="0.1"
          placeholder="0.0"
          required
        />
      </div>

      <div class="form-group full-width">
        <label for="synopsis">Synopsis *</label>
        <textarea 
          id="synopsis" 
          name="synopsis" 
          [(ngModel)]="movie.synopsis"
          class="form-control"
          rows="6"
          placeholder="Décrivez le film..."
          required
        ></textarea>
      </div>

      <div class="form-actions">
        <button 
          type="button" 
          class="btn-cancel" 
          routerLink="/movies">
          <i class="bi bi-x-circle"></i>
          Annuler
        </button>
        <button 
          type="button" 
          class="btn-submit" 
          (click)="updateMovie()">
          <i class="bi bi-pencil-square"></i>
          Modifier le film
        </button>
      </div>
    </form>
  </div>
</div>
