<h1>Ajouter un film</h1>

<div class="movie-container">
    <div class="d-flex flex-row align-items-center w-50">
    <label class="me-2" for="title">Titre : </label>
    <input 
    type="text" 
    id="title" 
    name="title" 
    [(ngModel)]="movie.title" 
    required 
    pattern="^[A-Z].*"
    #titleInput="ngModel"
    [class.is-invalid]="titleInput.invalid && titleInput.touched"
    class="form-control"
    />
    </div>

    <div class="d-flex flex-row align-items-center w-50">
    <label class="me-2" for="director">Réalisateur : </label>
    <input 
        type="text" 
        id="director" 
        name="director" 
        [(ngModel)]="movie.director"
        required
        pattern="^\s*[^\s]+\s+[^\s]+\s*$"
        #directorInput="ngModel"
        [class.is-invalid]="directorInput.invalid && directorInput.touched"
        class="form-control"
    />
    </div>

    <div class="d-flex flex-row align-items-center w-50">
    <label class="me-2" for="releaseDate">Date de sortie : </label>
    <input type="date" id="releaseDate" name="releaseDate" [(ngModel)]="movie.releaseDate"/>
    </div>

    <div class="d-flex flex-row align-items-center w-50">
    <label class="me-2" for="synopsis">Synopsis : </label>
    <textarea 
        id="synopsis" 
        name="synopsis" 
        [(ngModel)]="movie.synopsis" 
        rows="5" 
        class="w-100"
        required
        minlength="30"
        #synopsisInput="ngModel"
        [class.is-invalid]="synopsisInput.invalid && synopsisInput.touched"
    ></textarea>
    </div>

    <div class="bouton">
        <button class="btn btn-outline-dark" routerLink="/movies">Annuler</button>
        <button class="btn btn-dark" (click)="addMovie()">Ajouter</button>
        
    </div>
</div>
