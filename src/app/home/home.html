<swiper-container 
  navigation="true" 
  pagination="true" 
  slides-per-view="4" 
  space-between="20"
  class="my-movie-swiper"
  loop="true">

  @for (movie of movies$ | async; track movie.id) {
    <swiper-slide>
      <app-movie-card [movie]="movie"></app-movie-card>
    </swiper-slide>
  }
</swiper-container>
