<div class="swiper-section">
  <h2>Films populaires</h2>
  <section class="hero-swiper-section">
    <swiper-container
      navigation="true"
      pagination="true"
      slides-per-view="1.5"
      centered-slides="true"
      initial-slide="1"
      space-between="30"
      class="hero-movie-swiper"
      loop="true"
      grab-cursor="true"
      autoplay-delay="1500"
      autoplay-disable-on-interaction="false"
      speed="800">

      @for (movie of movies$ | async; track movie.id) {
        <swiper-slide>
          <app-movie-card-carousel [movie]="movie"></app-movie-card-carousel>
        </swiper-slide>
      }
    </swiper-container>
  </section>
</div>

<div class="swiper-section">
  <h2>Tous les films</h2>
  <swiper-container
    navigation="true"
    pagination="true"
    slides-per-view="4"
    space-between="20"
    class="my-movie-swiper"
    loop="true">

    @for (movie of movies$ | async; track movie.id) {
      <swiper-slide>
        <app-movie-card [movie]="movie"></app-movie-card>
      </swiper-slide>
    }
  </swiper-container>
</div>
