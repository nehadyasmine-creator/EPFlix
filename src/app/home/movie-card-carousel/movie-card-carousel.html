<div class="hero-movie-card" [routerLink]="['/movies', getMovieUrl(movie.title)]">
  <div class="hero-card-image">
    @if(movie.image) {
      <img [src]="'http://localhost:8080/movies/' + movie.id + '/image'"
        class="hero-image"
        alt="{{movie.title}}" />
    }
    <div class="hero-card-overlay"></div>
  </div>

  <div class="hero-card-content">
    <h2 class="hero-card-title">{{movie.title}}</h2>
    
    <div class="hero-card-meta">
      <span class="director">{{movie.director}}</span>
      <span class="divider">•</span>
      <span class="date">{{ movie.releaseDate | date:'yyyy' }}</span>
    </div>

    <p class="hero-card-synopsis">{{movie.synopsis}}</p>

    <div class="hero-card-rating">
      <div class="stars">
        @for (star of [1, 2, 3, 4, 5]; track star) {
          @if (movie.rate! >= star) {
            <i class="bi bi-star-fill"></i>
          } @else {
            <i class="bi bi-star"></i>
          }
        }
      </div>
      <span class="rating-value">{{movie.rate}}/5</span>
    </div>

    <a [routerLink]="['/movies', getMovieUrl(movie.title)]" class="hero-card-button">
      Voir plus
      <i class="bi bi-arrow-right"></i>
    </a>
  </div>
</div>
