<div class="card shadow hero-card">
  <div class="row g-0 align-items-center" [routerLink]="['/movies', getMovieUrl(movie.title)]">
    
    <div class="col-md-4 h-100">
      @if(movie.image) {
           <img [src]="'http://localhost:8080/movies/' + movie.id + '/image'"
             class="img-fluid rounded-start hero-image"
             alt="{{movie.title}}"
              />
      }
    </div>

    <div class="col-md-8 h-100">
      <div class="card-body d-flex flex-column h-100 pt-2">
        
        <h2 class="card-title fw-bold text-center mt-0 mb-3">{{movie.title}}</h2> 

        <p class="card-text fs-5 flex-grow-1">{{movie.synopsis}}</p>
        
        <div class="mt-2 text-end">
          <div class="stars-container">
            @for (star of [1, 2, 3, 4, 5]; track star) {
              @if (movie.rate! >= star) {
                <i class="bi bi-star-fill text-warning fs-4"></i>
              } @else {
                <i class="bi bi-star text-warning fs-4"></i>
              }
            }
            <span class="ms-2 text-muted">({{movie.rate}}/5)</span>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
