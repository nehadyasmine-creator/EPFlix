<div class="card shadow m-4 d-flex flex-column" 
     style="width: 18rem; transition: all 0.3s ease;" 
     [style.height]="isExpanded ? 'auto' : '450px'">
  
  @if(movie.image) {
    <img [src]="'http://localhost:8080/movies/' + movie.id + '/image'" 
         class="card-img-top movie-img" 
         alt="{{movie.title}}"
         [routerLink]="['/movies', getMovieUrl(movie.title)]">
  }

  <div class="card-body d-flex flex-column flex-grow-1">
    <h5 class="card-title">{{movie.title}}</h5>
    
    <p class="card-text" [class.text-truncate-custom]="!isExpanded">
      {{movie.synopsis}}
    </p>

    <button class="btn btn-link p-0 text-start mb-2" (click)="toggleExpand($event)">
      {{ isExpanded ? 'Voir moins' : 'Voir plus...' }}
    </button>
    
    <div class="mt-auto text-end">
      <div class="stars-container">
        @for (star of [1, 2, 3, 4, 5]; track star) {
          @if (movie.rate! >= star) {
            <i class="bi bi-star-fill text-warning fs-4"></i>
          } @else {
            <i class="bi bi-star text-warning fs-4"></i>
          }
        }
        <span class="ms-2 text-muted">({{movie.rate}}/5)</span>
      </div>
    </div>
  </div>
</div>
